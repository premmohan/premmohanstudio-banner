<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Mohan Studio — Banner</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Syne', sans-serif;
}

/* ✅ FIXED */
.banner {
  position: relative;
  width: 100%;
  max-width: 1200px;
  min-height: 240px;
  height: auto;
  background: #0d0d18;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid rgba(99, 102, 241, 0.2);
}

/* Grid */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridShift 20s linear infinite;
}

@keyframes gridShift {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* Orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: orbFloat 8s ease-in-out infinite;
}

.orb-1 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(99,102,241,0.35), transparent);
  top: -100px; left: -50px;
}

.orb-2 {
  width: 250px; height: 250px;
  background: radial-gradient(circle, rgba(139,92,246,0.25), transparent);
  top: 50px; right: 100px;
}

.orb-3 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(6,182,212,0.2), transparent);
  bottom: -50px; right: -30px;
}

@keyframes orbFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* Scanline */
.scanline {
  position: absolute;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(99,102,241,0.6), transparent);
  animation: scan 4s ease-in-out infinite;
}

@keyframes scan {
  0% { top: 0; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* Content */
.content {
  position: relative;
  z-index: 10;
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 60px;
  gap: 60px;
}

.left { flex: 1; }

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(99,102,241,0.12);
  border: 1px solid rgba(99,102,241,0.3);
  padding: 5px 14px;
  margin-bottom: 18px;
}

.badge-dot {
  width: 6px; height: 6px;
  background: #6366f1;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.5; }
}

.badge span {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #818cf8;
}

/* ✅ Responsive title */
.title {
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 800;
  color: white;
}

.title-studio {
  background: linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Tagline */
.tagline {
  font-size: 13px;
  color: #aaa;
  margin-top: 10px;
}

/* Right */
.right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 20px;
}

.cta-btn {
  padding: 14px 28px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color: white;
  font-weight: bold;
  text-decoration: none;
}

/* Tags */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.tag {
  font-size: 10px;
  border: 1px solid rgba(148,163,184,0.2);
  padding: 4px 10px;
}

/* URL */
.url-hint {
  position: absolute;
  bottom: 10px;
  left: 60px;
  font-size: 10px;
  color: rgba(99,102,241,0.5);
}

/* Particles */
.particle {
  position: absolute;
  font-size: 9px;
  color: rgba(99,102,241,0.3);
  animation: particleFade 6s infinite;
}

@keyframes particleFade {
  0%,100% { opacity:0; }
  50% { opacity:1; transform: translateY(-10px); }
}

/* ================= MOBILE FIX ================= */
@media (max-width: 768px) {

  body { padding: 10px; }

  .content {
    flex-direction: column;
    align-items: flex-start;
    padding: 20px;
    gap: 20px;
  }

  .right {
    width: 100%;
    align-items: flex-start;
  }

  .cta-btn {
    width: 100%;
    text-align: center;
  }

  .tags {
    justify-content: flex-start;
  }

  .url-hint {
    left: 20px;
  }

  .particle {
    display: none;
  }

  .orb {
    filter: blur(40px);
    opacity: 0.6;
  }
}
</style>
</head>

<body>

<a href="https://premmohanstudio.com" target="_blank" style="width:100%; display:block;">
<div class="banner">

  <div class="grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="scanline"></div>

  <div class="particle" style="top:20px;right:200px;">model.predict()</div>
  <div class="particle" style="top:60px;right:260px;">accuracy: 98.7%</div>

  <div class="content">
    <div class="left">
      <div class="badge"><div class="badge-dot"></div><span>Now Live — Explore Projects</span></div>

      <div class="title">
        PREM MOHAN<br>
        <span class="title-studio">STUDIO</span>
      </div>

      <div class="tagline">
        Where intelligence meets craft —<br>
        AI/ML apps, tools & experiments built for the real world.
      </div>
    </div>

    <div class="right">
      <div class="cta-btn">Visit Studio</div>

      <div class="tags">
        <div class="tag">AI / ML</div>
        <div class="tag">NLP</div>
        <div class="tag">Apps</div>
      </div>
    </div>
  </div>

  <div class="url-hint">premmohanstudio.com →</div>

</div>
</a>

</body>
</html>
