<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Mohan Studio — Banner</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Syne', sans-serif;
}

.banner {
  position: relative;
  width: 100%;
  max-width: 1200px;
  height: 280px;
  background: #0d0d18;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid rgba(99, 102, 241, 0.2);
}

/* Grid */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridShift 20s linear infinite;
}
@keyframes gridShift {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* Orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: orbFloat 8s ease-in-out infinite;
}
.orb-1 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(99,102,241,0.35), transparent);
  top: -100px; left: -50px;
}
.orb-2 {
  width: 250px; height: 250px;
  background: radial-gradient(circle, rgba(139,92,246,0.25), transparent);
  top: 50px; right: 100px;
}
.orb-3 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(6,182,212,0.2), transparent);
  bottom: -50px; right: -30px;
}
@keyframes orbFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* Content */
.content {
  position: relative;
  z-index: 10;
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 60px;
  justify-content: space-between;
}

.title {
  font-size: 48px;
  font-weight: 800;
  color: white;
}

.tagline {
  font-size: 14px;
  color: #aaa;
  margin-top: 10px;
}

.btn {
  padding: 12px 24px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color: white;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<a href="https://premmohanstudio.com" target="_blank" style="text-decoration:none;">
  <div class="banner">

    <div class="grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="content">
      <div>
        <div>Now Live — Explore Projects</div>

        <div class="title">
          PREM MOHAN<br>STUDIO
        </div>

        <div class="tagline">
          Where intelligence meets craft —<br>
          AI/ML apps, tools & experiments built for the real world.
        </div>
      </div>

      <div>
        <div class="btn">Visit Studio →</div>
      </div>
    </div>

  </div>
</a>

</body>
</html>
