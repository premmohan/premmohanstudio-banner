<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Mohan Studio — Banner</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Syne', sans-serif;
}

.banner {
  position: relative;
  width: 100%;
  max-width: 1200px;
  height: 280px;
  background: #0d0d18;
  overflow: hidden;
  border: 1px solid rgba(99,102,241,0.2);
}

/* GRID */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridShift 20s linear infinite;
}
@keyframes gridShift {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* ORBS */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: orbFloat 8s ease-in-out infinite;
}
.orb-1 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(99,102,241,0.35), transparent);
  top: -100px; left: -50px;
}
.orb-2 {
  width: 250px; height: 250px;
  background: radial-gradient(circle, rgba(139,92,246,0.25), transparent);
  top: 50px; right: 100px;
}
.orb-3 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(6,182,212,0.2), transparent);
  bottom: -50px; right: -30px;
}
@keyframes orbFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* SCANLINE */
.scanline {
  position: absolute;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(99,102,241,0.6), transparent);
  animation: scan 4s ease-in-out infinite;
}
@keyframes scan {
  0% { top: 0; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* PARTICLES */
.particle {
  position: absolute;
  font-size: 10px;
  color: rgba(99,102,241,0.3);
  animation: particleFade 6s ease-in-out infinite;
}
@keyframes particleFade {
  0%,100% { opacity: 0; }
  50% { opacity: 1; transform: translateY(-10px); }
}

/* CONTENT */
.content {
  position: relative;
  z-index: 10;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
}

.title {
  font-size: 52px;
  font-weight: 800;
  color: white;
  line-height: 1;
}

.tagline {
  margin-top: 10px;
  font-size: 14px;
  color: #aaa;
}

.btn {
  padding: 14px 28px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color: white;
  font-weight: bold;
  text-decoration: none;
}
</style>
</head>

<body>

<a href="https://premmohanstudio.com" target="_blank" style="text-decoration:none;">
<div class="banner">

  <!-- Background -->
  <div class="grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="scanline"></div>

  <!-- Particles -->
  <div class="particle" style="top:20px;right:200px;">model.predict()</div>
  <div class="particle" style="top:60px;right:260px;">accuracy: 98.7%</div>
  <div class="particle" style="bottom:40px;left:400px;">def train():</div>

  <!-- Content -->
  <div class="content">
    <div>
      <div style="color:#6366f1; margin-bottom:10px;">Now Live — Explore Projects</div>

      <div class="title">
        PREM MOHAN<br>STUDIO
      </div>

      <div class="tagline">
        Where intelligence meets craft —<br>
        AI/ML apps, tools & experiments built for the real world.
      </div>
    </div>

    <div>
      <div class="btn">Visit Studio →</div>
    </div>
  </div>

</div>
</a>

</body>
</html>
